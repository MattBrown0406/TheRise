<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Rise: Fly Fishing Prototype</title>
  <style>
    :root {
      --ink: #162019;
      --muted: #637064;
      --line: #d9ded4;
      --paper: #f7f4ec;
      --panel: #fffdf7;
      --river: #4b8794;
      --pine: #2f5b45;
      --copper: #b96b35;
      --gold: #d6a94a;
      --sky: #dcebf0;
      --danger: #b44b3d;
      --shadow: 0 18px 44px rgba(30, 43, 34, .14);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(220, 235, 240, .92), rgba(247, 244, 236, .95) 38%),
        radial-gradient(circle at 18% 12%, rgba(214, 169, 74, .22), transparent 34%),
        var(--paper);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 228px minmax(0, 1fr);
      background: rgba(255, 253, 247, .68);
      box-shadow: 0 0 0 1px rgba(47, 91, 69, .08);
    }

    .rail {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 16px;
      border-right: 1px solid var(--line);
      background: rgba(255, 253, 247, .88);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 4px 14px;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--pine);
      display: grid;
      place-items: center;
      color: white;
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, .14);
    }

    .mark svg {
      width: 26px;
      height: 26px;
    }

    .brand strong {
      display: block;
      font-size: 17px;
      line-height: 1;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .tab-list {
      display: grid;
      gap: 6px;
    }

    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 11px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      transition: .18s ease;
    }

    .tab svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .tab[aria-selected="true"] {
      background: #e8efe8;
      color: var(--pine);
      font-weight: 750;
    }

    .rail-card {
      margin-top: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #f3f6ef;
    }

    .rail-card strong {
      display: block;
      font-size: 13px;
    }

    .rail-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.35;
    }

    main {
      padding: 28px;
      min-width: 0;
      max-width: 100%;
    }

    .view {
      display: none;
      min-width: 0;
      max-width: 100%;
    }

    .view.active {
      display: block;
      animation: riseIn .22s ease both;
    }

    @keyframes riseIn {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 17px;
      margin-bottom: 8px;
    }

    .subtle {
      color: var(--muted);
      line-height: 1.45;
    }

    .sync-pill {
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 247, .8);
      padding: 8px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .today-screen {
      background: #f8f5ed;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
      box-shadow: var(--shadow);
      border: 1px solid rgba(22, 32, 25, .08);
    }

    .today-hero {
      position: relative;
      min-height: 430px;
      padding: 36px 40px 88px;
      color: #fff;
      background: #155a6b;
      overflow: hidden;
    }

    .today-hero:before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(16, 84, 102, .9), rgba(16, 84, 102, .82)),
        url("the-rise-river.png") center/cover;
      opacity: .96;
    }

    .today-hero > * {
      position: relative;
      z-index: 1;
    }

    .home-water-control {
      width: min(460px, 100%);
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .home-water-control label {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255, 255, 255, .78);
    }

    .home-water-control select {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 8px;
      color: #fff;
      background:
        linear-gradient(45deg, transparent 50%, rgba(255, 255, 255, .92) 50%) right 18px center / 7px 7px no-repeat,
        linear-gradient(135deg, rgba(255, 255, 255, .92) 50%, transparent 50%) right 13px center / 7px 7px no-repeat,
        rgba(255, 255, 255, .16);
      appearance: none;
      padding: 10px 42px 10px 14px;
      font-weight: 850;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12);
      backdrop-filter: blur(8px);
    }

    .home-water-control select:focus {
      outline: 3px solid rgba(240, 179, 61, .36);
      outline-offset: 2px;
    }

    .home-water-control option {
      color: var(--ink);
      background: #fffdf7;
    }

    .prime-title {
      font-size: clamp(36px, 6vw, 62px);
      line-height: .95;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 0;
      overflow-wrap: break-word;
    }

    .condition-line {
      color: rgba(255, 255, 255, .9);
      font-size: clamp(18px, 2.7vw, 26px);
      font-weight: 650;
      margin-bottom: 30px;
    }

    .fishability-card {
      display: flex;
      align-items: center;
      gap: 26px;
      width: min(680px, 100%);
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 28px;
      padding: 24px 30px;
      backdrop-filter: blur(8px);
    }

    .score-ring {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      background: conic-gradient(#f0b33d var(--score-deg), rgba(255, 255, 255, .28) 0);
      position: relative;
    }

    .score-ring:before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: #126176;
    }

    .score-ring strong {
      position: relative;
      color: white;
      font-size: 30px;
      line-height: 1;
    }

    .fishability-copy strong {
      display: block;
      color: #fff;
      font-size: clamp(24px, 3.2vw, 34px);
      margin-bottom: 8px;
    }

    .fishability-copy {
      min-width: 0;
    }

    .fishability-copy span {
      display: block;
      color: rgba(255, 255, 255, .9);
      font-size: clamp(16px, 2.3vw, 24px);
      line-height: 1.25;
      overflow-wrap: break-word;
    }

    .fishability-copy small {
      display: block;
      margin-top: 8px;
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.25;
    }

    .today-body {
      position: relative;
      margin-top: -54px;
      padding: 0 38px 36px;
      z-index: 2;
    }

    .today-body:before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -28px;
      height: 70px;
      background: #f8f5ed;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      z-index: -1;
    }

    .condition-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 34px;
      min-width: 0;
    }

    .condition-card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid #e0dbcf;
      border-radius: 24px;
      padding: 24px 18px;
      text-align: center;
      min-width: 0;
      box-shadow: 0 8px 18px rgba(30, 43, 34, .05);
    }

    .condition-card strong {
      display: block;
      color: #16485a;
      font-size: clamp(30px, 5vw, 44px);
      line-height: .95;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
    }

    .condition-card span {
      display: block;
      color: #65716d;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 750;
      margin-bottom: 12px;
    }

    .condition-card small {
      display: inline-block;
      border-radius: 0;
      padding: 8px 12px;
      background: #f7e9bf;
      color: #9b6523;
      font-weight: 850;
      line-height: 1.15;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: #5d6d69;
      font-size: clamp(20px, 2.6vw, 28px);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 0 0 18px;
    }

    .section-title em {
      color: #0b6685;
      font-size: .82em;
      font-style: normal;
      font-weight: 650;
      text-transform: none;
      letter-spacing: 0;
    }

    .hatch-card,
    .bench-card {
      background: rgba(255, 255, 255, .94);
      border: 1px solid #e0dbcf;
      border-radius: 26px;
      padding: 22px 28px;
      box-shadow: 0 8px 18px rgba(30, 43, 34, .06);
      margin-bottom: 34px;
    }

    .hatch-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid #e5dfd2;
      min-width: 0;
    }

    .hatch-row:last-child {
      border-bottom: 0;
    }

    .hatch-thumb {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background-color: #e6f1e9;
      background-repeat: no-repeat;
      background-size: 200% 200%;
      border: 1px solid #d9e5d8;
    }

    .hatch-row strong {
      display: block;
      font-size: clamp(20px, 2.7vw, 28px);
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .hatch-row > div:nth-child(2) {
      min-width: 0;
    }

    .hatch-row span {
      display: block;
      color: #65716d;
      font-size: clamp(15px, 2.1vw, 22px);
      overflow-wrap: anywhere;
    }

    .status-pill {
      border-radius: 999px;
      padding: 10px 18px;
      min-width: 92px;
      text-align: center;
      font-weight: 950;
      color: #627069;
      background: #e6efe8;
      text-transform: uppercase;
    }

    .status-pill.now {
      background: #f2dfae;
    }

    .status-pill.soon {
      background: #e9eef1;
    }

    .bench-grid {
      display: grid;
      gap: 22px;
    }

    .bench-group {
      display: grid;
      gap: 12px;
    }

    .bench-group h3 {
      margin: 0;
      color: #16485a;
      font-size: 18px;
    }

    .bench-stage-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .bench-stage {
      border: 1px solid #e0dbcf;
      border-radius: 16px;
      background: #fbfaf5;
      padding: 8px;
      min-width: 0;
    }

    .bench-stage-image {
      aspect-ratio: 1.2;
      border-radius: 12px;
      border: 1px solid var(--line);
      background-color: #edf0eb;
      background-repeat: no-repeat;
      background-size: 200% 200%;
      margin-bottom: 8px;
    }

    .bench-stage b,
    .bench-stage span {
      display: block;
    }

    .bench-stage b {
      font-size: 12px;
      color: #162019;
      margin-bottom: 3px;
    }

    .bench-stage span {
      color: #65716d;
      font-size: 11px;
      line-height: 1.25;
    }

    .hero {
      min-height: 332px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, .9fr);
      background: #223b31;
      color: white;
      box-shadow: var(--shadow);
    }

    .river-art {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, rgba(18, 30, 23, .92), rgba(18, 30, 23, .52) 48%, rgba(18, 30, 23, .2)),
        url("the-rise-river.png") center/cover;
    }

    .hero-copy,
    .hero-panel {
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      padding: 34px;
      align-self: end;
    }

    .hero-copy .eyebrow,
    .hero-copy .subtle {
      color: rgba(255, 255, 255, .78);
    }

    .hero-copy h1 {
      max-width: 600px;
      text-shadow: 0 1px 16px rgba(0, 0, 0, .28);
    }

    .hero-panel {
      align-self: center;
      margin: 24px 24px 24px 0;
      border: 1px solid rgba(255, 255, 255, .24);
      border-radius: 8px;
      padding: 18px;
      background: rgba(255, 253, 247, .9);
      color: var(--ink);
      backdrop-filter: blur(10px);
    }

    .big-score {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 12px;
    }

    .score {
      font-size: 58px;
      line-height: .82;
      font-weight: 850;
      color: var(--pine);
    }

    .score-label {
      color: var(--muted);
      line-height: 1.18;
      margin-bottom: 3px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric strong {
      font-size: 17px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, .9fr);
      gap: 16px;
      margin-top: 16px;
    }

    .waters-accordion-grid {
      grid-template-columns: minmax(0, 1fr);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, .9);
      padding: 18px;
      box-shadow: 0 8px 22px rgba(30, 43, 34, .05);
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .water-list,
    .bug-list,
    .knot-list,
    .log-list {
      display: grid;
      gap: 10px;
    }

    .water-card,
    .bug-card,
    .knot-card,
    .log-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: .16s ease;
    }

    .top-water-card {
      border: 1px solid rgba(47, 91, 69, .34);
      border-radius: 8px;
      background: rgba(255, 253, 247, .96);
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    .top-water-card h2 {
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1;
      margin-bottom: 7px;
    }

    .top-water-score {
      font-size: 34px;
      font-weight: 920;
      color: #050807;
      align-self: end;
    }

    .ranked-water-card {
      cursor: pointer;
      grid-template-columns: minmax(0, 1fr) 102px;
      align-items: stretch;
    }

    .water-card-main {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .water-rank-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .water-fly-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .water-fly-badge {
      border: 1px solid rgba(185, 107, 53, .24);
      border-radius: 999px;
      background: #fff4e8;
      color: #7b431c;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .water-fly-badge.active {
      background: #e7f1ef;
      color: var(--pine);
      border-color: rgba(47, 91, 69, .28);
    }

    .water-fly-preview {
      aspect-ratio: 1;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background-color: #edf0eb;
      background-repeat: no-repeat;
      background-size: 200% 200%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .38);
      align-self: center;
    }

    .model-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .top-water-card .water-fly-preview {
      width: 132px;
    }

    .accordion-detail {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      gap: 14px;
    }

    .accordion-detail h3 {
      margin-bottom: 4px;
    }

    .accordion-detail .fly-stack {
      margin-top: 8px;
    }

    .log-screen {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .log-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .log-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .log-stat {
      border: 1px solid #e0dbcf;
      border-radius: 24px;
      background: rgba(255, 255, 255, .92);
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 8px 18px rgba(30, 43, 34, .05);
      min-width: 0;
      overflow: hidden;
    }

    .log-stat strong {
      display: block;
      color: #16485a;
      font-size: clamp(30px, 5vw, 44px);
      line-height: .95;
      margin-bottom: 12px;
      overflow-wrap: anywhere;
    }

    .log-stat span {
      display: block;
      color: #65716d;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 750;
    }

    .log-entry-list {
      display: grid;
      gap: 20px;
    }

    .catch-card {
      border: 1px solid #e0dbcf;
      border-radius: 24px;
      background: rgba(255, 255, 255, .94);
      padding: 24px;
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      align-items: center;
      gap: 24px;
      box-shadow: 0 8px 18px rgba(30, 43, 34, .05);
    }

    .catch-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfaf5;
      color: var(--pine);
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 850;
    }

    .mini-btn.danger {
      color: var(--danger);
      background: #f8ebe8;
      border-color: rgba(180, 75, 61, .22);
    }

    .catch-photo {
      width: 128px;
      height: 128px;
      border-radius: 22px;
      border: 1px solid rgba(47, 91, 69, .14);
      background:
        radial-gradient(circle at 42% 42%, rgba(255, 255, 255, .72), transparent 0 19px),
        linear-gradient(135deg, #5fb2c7, #4d8658);
      display: grid;
      place-items: center;
      color: white;
      font-size: 44px;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .catch-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .catch-card strong {
      display: block;
      font-size: clamp(21px, 3vw, 30px);
      line-height: 1.05;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .catch-card span {

      gap: 12px;

    .chips {

      flex-wrap: wrap;
      gap: 6px;

    .chip {
      border: 1px solid rgba(47, 91, 69, .16);

      background: #edf3ef;
      color: var(--pine);
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;

    .chip.copper {
      background: #f7eadf;
      color: #854518;
      border-color: rgba(185, 107, 53, .25);
    }

    .chip.blue {
      background: #e6f1f4;
      color: #326573;
      border-color: rgba(75, 135, 148, .25);
    }

    .chip.red {
      background: #f7e7e3;
      color: var(--danger);
      border-color: rgba(180, 75, 61, .25);
    }

    .line-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .line-row:last-child {
      border-bottom: 0;
    }

    .line-row span {
      color: var(--muted);
    }

    .live-panel {
      border: 1px solid rgba(75, 135, 148, .28);
      border-radius: 8px;
      background: #f2f8f8;
      padding: 14px;
      display: grid;
      gap: 10px;

    .live-panel .panel-head {
      margin-bottom: 0;

    .source-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;

    .fly-stack {

      gap: 10px;

    .fly {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;

      border-radius: 8px;
      background: var(--panel);

    .fly-photo {

      height: 48px;

      background-repeat: no-repeat;
      background-size: 200% 200%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .38);

    .fly-dot {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      flex: 0 0 auto;
      background:

        linear-gradient(135deg, #2f5b45, #b96b35);
      position: relative;

    .fly-dot:before,
    .fly-dot:after {
      content: "";
      position: absolute;
      background: rgba(22, 32, 25, .75);
      height: 2px;
      width: 28px;
      left: 3px;
      top: 16px;

    .fly-dot:before {
      transform: rotate(28deg);
    }

    .fly-dot:after {
      transform: rotate(-28deg);

    .segmented,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .segmented button,
    .ghost-btn,
    .primary-btn,
    .icon-btn {
      border-radius: 8px;
      border: 1px solid var(--line);
      min-height: 38px;
      background: var(--panel);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      font-weight: 750;
    }

    .segmented button.active,
    .primary-btn {
      background: var(--pine);
      color: white;
      border-color: var(--pine);
    }

    .ghost-btn svg,
    .primary-btn svg,
    .icon-btn svg {
      width: 17px;
      height: 17px;
    }

    .icon-btn {
      width: 38px;
      padding: 0;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 11px 12px;
      outline: none;

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 760;
      color: var(--muted);

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .span-2 {
      grid-column: 1 / -1;
    }

    .bug-layout,
    .knot-layout,
    .pro-layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 16px;
    }

    .bug-layout {
      grid-template-columns: minmax(0, 1fr);
    }

    .knot-layout {
      grid-template-columns: minmax(0, 1fr);
    }

    .knot-picker .knot-list {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .bug-art,
    .bug-stage-photo {
      border: 1px solid var(--line);
      border-radius: 8px;
      background-color: #edf0eb;
      background-repeat: no-repeat;
      background-size: 200% 200%;
      position: relative;
      overflow: hidden;
    }

    .bug-art {
      height: 146px;
      background-size: cover;
      background-position: center;
    }

    .bug-art:after,
    .bug-stage-photo:after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .34);
      pointer-events: none;
    }

    .bug-stage-photo {
      aspect-ratio: 1;
      margin-bottom: 9px;
    }

    .bug-accordion-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .bug-accordion-body {
      display: grid;
      gap: 12px;
    }

    .bug-stage-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(138px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;

    .bug-strip-stage {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf5;
      padding: 8px;
    }

      margin-bottom: 8px;
    }

    .bug-strip-stage b {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .bug-strip-stage span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .stage-button {
      text-align: left;
      cursor: pointer;
    }

    .stage-button.active {
      border-color: rgba(185, 107, 53, .5);
      box-shadow: 0 8px 18px rgba(185, 107, 53, .12);
    }

    .fly-library {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .fly-filter-row,
    .fly-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .fly-badge {
      border: 1px solid rgba(47, 91, 69, .16);
      border-radius: 999px;
      background: #edf3ef;
      color: var(--pine);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 850;
    }

    .fly-badge.active {
      background: #f7eadf;
      color: #854518;
      border-color: rgba(185, 107, 53, .35);
    }

    .fly-trigger-chip {
      cursor: pointer;

    .fly-trigger-chip:focus-visible {
      outline: 3px solid rgba(31, 125, 149, .24);
      outline-offset: 2px;
    }

    .fly-reference {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf5;
      padding: 12px;

    .fly-reference-image {
      aspect-ratio: 1.25;
      border-radius: 8px;
      border: 1px solid var(--line);
      background-color: #edf0eb;
      background-repeat: no-repeat;
      background-size: 200% 200%;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;

    .knot-visual svg {

      height: auto;

    }

    .detail-hero {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
      overflow-x: auto;

    .stage {

      background: var(--panel);

      display: grid;
      align-content: space-between;

    .stage span {

      font-size: 13px;
      line-height: 1.35;

    .knot-visual {
      border: 1px solid var(--line);

      background: #fbfaf5;

      display: grid;
      align-content: end;

    .price {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 18px 0;
    }

    .price strong {
      font-size: 52px;
      line-height: .9;
    }

    .toggle {
      width: 54px;
      height: 30px;
      border-radius: 999px;
      border: 0;
      background: var(--pine);
      padding: 3px;
      display: flex;
      justify-content: flex-end;

      content: "";

      height: 24px;
      border-radius: 50%;
      background: white;
      display: block;
    }

    .toggle.monthly {
      justify-content: flex-start;
      background: var(--copper);

    .footer-tabs {
      display: none;
    }

    @media (max-width: 940px) {
      .app-shell {
        grid-template-columns: 1fr;
        width: 100vw;
        max-width: 100vw;
        overflow-x: hidden;
      }

        display: none;

        padding: 0 0 86px;

      .topbar {

        grid-template-columns: 1fr;

      .topbar {

      .today-hero {

      .home-water-control label {

      .prime-title {
        font-size: 30px;
        line-height: 1;
      }

      .condition-line {
        font-size: 17px;
      }

      .fishability-card {
        border-radius: 26px;
        padding: 18px 16px;
        gap: 14px;
      }

      .score-ring {
        width: 90px;
        height: 90px;
      }

      .score-ring strong {
        font-size: 26px;
      }

      .today-body {
        padding: 0 18px 28px;
        width: 100%;
        max-width: 100%;
      }

      .condition-cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .condition-card {
        border-radius: 18px;
        padding: 16px 6px;
      }

      .condition-card strong {
        font-size: 22px;
      }

      .condition-card span {
        font-size: 11px;
      }

      .condition-card small {
        font-size: 10px;

        max-width: 100%;

        padding-right: 50px;

        max-width: 100%;

      .hatch-thumb {
        width: 52px;

      .bench-stage b {

    function $(selector) {
      return document.querySelector(selector);
    }

    function all(selector) {
      return Array.from(document.querySelectorAll(selector));
    }

    function getWater() {
      return waters.find((water) => water.id === activeWater) || waters[0];
    }

    function getHomeWater() {
      return waters.find((water) => water.id === homeWaterId) || getWater();
    }

    function readSavedWaterId(key) {
      try {
        const saved = localStorage.getItem(key);
        return waters.some((water) => water.id === saved) ? saved : "";
      } catch {
        return "";
      }
    }

    function saveActiveWater(waterId) {
      activeWater = waters.some((water) => water.id === waterId) ? waterId : waters[0].id;
      try {
        localStorage.setItem(ACTIVE_WATER_KEY, activeWater);
      } catch {
        // Local persistence is a convenience for the prototype.
      }
    }

    function saveHomeWater(waterId) {
      homeWaterId = waters.some((water) => water.id === waterId) ? waterId : waters[0].id;
      try {
        localStorage.setItem(HOME_WATER_KEY, homeWaterId);
      } catch {
        // Local persistence is a convenience for the prototype.
      }
    }

    function getBug() {
      return bugs.find((bug) => bug.id === activeBug) || bugs[0];
    }

    function getKnot() {
      return knots.find((knot) => knot.id === activeKnot) || knots[0];
    }

    function clampScore(score) {
      return Math.max(1, Math.min(10, score));
    }

    function readUserLocation() {
      try {
        const saved = localStorage.getItem(USER_LOCATION_KEY);
        return saved ? JSON.parse(saved) : null;
      } catch {
        return null;
      }
    }

    function saveUserLocation(location) {
      userLocation = location;
      localStorage.setItem(USER_LOCATION_KEY, JSON.stringify(location));
    }

    function waterCoords(water) {
      return waterCoordinates[water.id] || liveSources[water.id] || null;
    }

    function milesBetween(a, b) {
      if (!a || !b) return null;
      const toRad = (value) => value * Math.PI / 180;
      const earthMiles = 3958.8;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lon - a.lon);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * earthMiles * Math.asin(Math.min(1, Math.sqrt(h)));
    }

    function distanceToWater(water) {
      return milesBetween(userLocation, waterCoords(water));
    }

    function distanceLabel(water) {
      const miles = distanceToWater(water);
      if (miles === null) return "";
      if (miles < 1) return `${Math.max(.1, miles).toFixed(1)} mi`;
      if (miles < 10) return `${miles.toFixed(1)} mi`;
      return `${Math.round(miles)} mi`;
    }

    function locationFreshnessLabel() {
      if (!userLocation?.updatedAt) return "";
      return `Last location ${formatSavedTime(userLocation.updatedAt)}`;
    }

    function locationSummary() {
      if (locationStatus === "loading") return "Finding your location...";
      if (locationStatus === "error") return "Location unavailable. Check permission or service.";
      if (userLocation) return `${locationFreshnessLabel()} - distance is straight-line`;
      return "Use location to rank nearby water as you move.";
    }

    function proximityScore(water) {
      const miles = distanceToWater(water);
      if (miles === null) return 0;
      if (miles <= 5) return 1.6;
      if (miles <= 15) return 1.1;
      if (miles <= 30) return .65;
      if (miles <= 60) return .25;
      if (miles <= 100) return 0;
      return -.35;
    }

    function rankedScore(water) {
      const score = Number(fishScore(water));
      if (waterSortMode !== "Near" || !userLocation) return score;
      return clampScore(score + proximityScore(water));
    }

    function requestUserLocation() {
      if (!navigator.geolocation) {
        locationStatus = "error";
        renderWaters();
        bindDynamic();
        return;
      }
      locationStatus = "loading";
      renderWaters();
      bindDynamic();
      navigator.geolocation.getCurrentPosition((position) => {
        saveUserLocation({
          lat: position.coords.latitude,
          lon: position.coords.longitude,
          accuracy: position.coords.accuracy,
          updatedAt: new Date().toISOString()
        });
        waterSortMode = "Near";
        locationStatus = "ready";
        renderWaters();
        bindDynamic();
      }, () => {
        locationStatus = "error";
        renderWaters();
        bindDynamic();
      }, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 5 * 60 * 1000
      });
    }

    function fishScore(water) {
      let score = water.score / 10;
      const report = liveReports.byWater[water.id];
      const intel = localIntelForWater(water);
      score += intel.scoreBoost || 0;
      if (report?.status === "ready") {
        const waterTemp = numberFromText(report.usgs?.waterTemp || water.temp);
        const wind = numberFromText(report.nws?.wind || water.wind);
        const forecast = `${report.nws?.forecast || ""}`.toLowerCase();
        if (water.type === "Lake") {
          if (waterTemp !== null && waterTemp >= 52 && waterTemp <= 62) score += .35;
          if (waterTemp !== null && (waterTemp < 45 || waterTemp > 68)) score -= .45;
          if (wind !== null && wind >= 4 && wind <= 11) score += .25;
          if (wind !== null && wind > 16) score -= .55;
        } else {
          if (waterTemp !== null && waterTemp >= 50 && waterTemp <= 58) score += .35;
          if (waterTemp !== null && waterTemp < 42) score -= .35;
          if (waterTemp !== null && waterTemp > 66) score -= .75;
          if (wind !== null && wind > 18) score -= .25;
        }
        if (forecast.includes("cloud") || forecast.includes("overcast")) score += .2;
        if (forecast.includes("thunder") || forecast.includes("snow")) score -= .45;
      }
      return clampScore(score).toFixed(1);
    }

    function scoreSourceLabel(water) {
      const report = liveReports.byWater[water.id];
      const intel = localIntelForWater(water);
      if (report?.refreshing) return "Updating local cache";
      if (report?.status === "ready" && intel.sources?.length) return "Cached live + local report score";
      if (report?.status === "ready" && report.fromCache) return "Local cached live score";
      if (report?.status === "ready") return "Live-adjusted prototype score";
      if (report?.status === "loading") return "Checking live inputs";
      return "Demo baseline score";
    }

    function clarityFor(water) {
      if (water.type === "Lake") return { inches: '36"', label: "clear", trend: "wind lanes" };
      if (water.id === "lower-deschutes") return { inches: '18"', label: "slightly stained", trend: "rain upstream" };
      if (water.id === "middle-deschutes") return { inches: '24"', label: "green-clear", trend: "canyon shade" };
      if (water.id === "upper-deschutes") return { inches: '30"', label: "tea clear", trend: "meadow stain" };
      if (water.id === "crooked") return { inches: '28"', label: "clear-green", trend: "dam release" };
      return { inches: '24"', label: "fishable stain", trend: "stable" };
    }

    function uniqueItems(items) {
      return [...new Set(items.filter(Boolean))];

    function localIntelForWater(water) {
      const intel = liveReports.cache?.localIntel?.byWater?.[water.id];
      return intel || { hatches: [], flies: [], sources: [], cues: [], scoreBoost: 0 };
    }

    function normalizeHatchForWater(hatch, water) {
      const label = String(hatch || "");
      const lower = label.toLowerCase();
      if (water.type !== "Lake" && (lower.includes("chironomid") || lower === "midge")) return "Midge";
      if (water.type === "Lake" && lower === "midge") return "Chironomid";
      return label;
    }

    function predictedHatches(water) {
      const report = liveReports.byWater[water.id];
      const waterTemp = numberFromText(report?.usgs?.waterTemp || water.temp);
      const wind = numberFromText(report?.nws?.wind || water.wind);
      const forecast = `${report?.nws?.forecast || ""}`.toLowerCase();
      const hatches = [...water.hatch];
      const intel = localIntelForWater(water);
      hatches.unshift(...intel.hatches);
      if (report?.status === "ready") {
        if (water.type === "Lake") {
          if (waterTemp !== null && waterTemp >= 54) hatches.unshift("Damsel", "Callibaetis");
          if (wind !== null && wind <= 8) hatches.unshift("Chironomid");
        } else {
          if (waterTemp !== null && waterTemp < 50) hatches.unshift("BWO", "Midge");
          if (waterTemp !== null && waterTemp >= 50 && waterTemp <= 58) hatches.unshift("PMD", "Caddis");
          if (forecast.includes("cloud") || forecast.includes("rain")) hatches.unshift("BWO");
        }
      }
      return uniqueItems(hatches.map((hatch) => normalizeHatchForWater(hatch, water))).slice(0, 4);
    }

    function primeWindowFor(water) {
      const hatchText = predictedHatches(water).join(" ").toLowerCase();
      const report = liveReports.byWater[water.id];
      const wind = numberFromText(report?.nws?.wind || water.wind);
      if (water.type === "Lake") {
        if (wind !== null && wind > 14) return "Prime window: first calm hour";
        return hatchText.includes("damsel") ? "Prime window: 7-10 AM" : "Prime window: 8-11 AM";
      }
      if (hatchText.includes("caddis") && hatchText.includes("pmd")) return "Prime window: 8-11 AM";
      if (hatchText.includes("bwo")) return "Prime window: 10 AM-1 PM";
      return "Prime window: 6-9 PM";
    }

    function fishabilitySummary(water) {
      const score = Number(fishScore(water));
      if (score >= 8) return "Strong day to fish";
      if (score >= 6.5) return "Good, with windows";
      if (score >= 5) return "Technical but fishable";
      return "Scout or wait it out";
    }

    function fishabilityReason(water) {
      const clarity = clarityFor(water);
      const hatch = predictedHatches(water)[0] || "hatch";
      if (water.type === "Lake") return `${water.wind} wind + ${hatch.toLowerCase()} activity near weed edges`;
      return `${clarity.label} water + ${hatch.toLowerCase()} hatch building`;
    }

    function liveMetaFor(water) {
      if (liveSources[water.id]) return liveSources[water.id];
      const fallback = water.type === "Lake" ? { lat: 44.05, lon: -121.32 } : { lat: 44.06, lon: -121.31 };
      return { ...fallback, reportKey: water.name };
    }

    function emptyWaterCache() {
      return { version: 1, byWater: {}, localIntel: { byWater: {}, sources: [], updatedAt: "", errors: [] }, lastSavedAt: "", lastDailyOpen: "" };
    }

    function readWaterCache() {
      try {
        const saved = localStorage.getItem(WATER_REPORT_CACHE_KEY);
        if (!saved) return emptyWaterCache();
        return { ...emptyWaterCache(), ...JSON.parse(saved) };
      } catch {
        return emptyWaterCache();
      }
    }

    function writeWaterCache(cache) {
      liveReports.cache = cache;
      localStorage.setItem(WATER_REPORT_CACHE_KEY, JSON.stringify(cache));
    }

    function hydrateWaterCache() {
      const cache = readWaterCache();
      liveReports.cache = cache;
      Object.entries(cache.byWater || {}).forEach(([waterId, report]) => {
        liveReports.byWater[waterId] = {
          ...report,
          status: "ready",
          fromCache: true,
          refreshing: false
        };
      });
    }

    function cacheReport(waterId, report, mode = "manual") {
      const cache = liveReports.cache || readWaterCache();
      const cachedReport = {
        ...report,
        status: "ready",
        fromCache: false,
        refreshing: false,
        cacheMode: mode,
        cachedAt: new Date().toISOString()
      };
      cache.byWater[waterId] = cachedReport;
      cache.lastSavedAt = cachedReport.cachedAt;
      writeWaterCache(cache);
      liveReports.byWater[waterId] = cachedReport;
      return cachedReport;
    }

    function pacificDateKey(date = new Date()) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Los_Angeles",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date).reduce((memo, part) => {
        memo[part.type] = part.value;
        return memo;
      }, {});
      return `${parts.year}-${parts.month}-${parts.day}`;
    }

    function formatSavedTime(value) {
      if (!value) return "Never saved";
      return new Date(value).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function cachedWaterCount() {
      return Object.keys(liveReports.cache?.byWater || {}).length;
    }

    function cacheSummary() {
      const count = cachedWaterCount();
      const savedAt = liveReports.cache?.lastSavedAt;
      if (!count) return "No local water cache yet";
      const intelCount = Object.keys(liveReports.cache?.localIntel?.byWater || {}).length;
      const intelText = intelCount ? `, ${intelCount} with local report signals` : "";
      return `${count}/${waters.length} waters saved locally${intelText} - ${formatSavedTime(savedAt)}`;
    }

    function shouldRunDailyOpenSync() {
      if (navigator.onLine === false) return false;
      const cache = liveReports.cache || readWaterCache();
      if (!Object.keys(cache.byWater || {}).length) return true;
      return cache.lastDailyOpen !== pacificDateKey();
    }

    function markDailyOpenSyncComplete() {
      const cache = readWaterCache();
      cache.lastDailyOpen = pacificDateKey();
      cache.lastSavedAt = cache.lastSavedAt || new Date().toISOString();
      writeWaterCache(cache);
    }

    function fahrenheitFromC(value) {
      const n = Number(value);
      return Number.isFinite(n) ? Math.round((n * 9 / 5) + 32) : null;
    }

    function latestUsgsValue(series) {
      const points = series?.values?.[0]?.value || [];
      return points.length ? points[points.length - 1] : null;
    }

    async function fetchJsonWithTimeout(url, label) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), LIVE_FETCH_TIMEOUT_MS);
      try {
        const response = await fetch(url, { signal: controller.signal });
        if (!response.ok) throw new Error(`${label} ${response.status}`);
        return await response.json();
      } catch (error) {
        if (error.name === "AbortError") throw new Error(`${label} timeout`);
        throw error;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function fetchTextWithTimeout(url, label) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), LIVE_FETCH_TIMEOUT_MS);
      try {
        const response = await fetch(url, { signal: controller.signal });
        if (!response.ok) throw new Error(`${label} ${response.status}`);
        return await response.text();
      } catch (error) {
        if (error.name === "AbortError") throw new Error(`${label} timeout`);
        throw error;
      } finally {
        clearTimeout(timeout);
      }
    }

    function textFromHtml(html) {
      return String(html || "")
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function aliasesForWater(water) {
      return uniqueItems([
        water.name,
        water.section,
        ...(waterAliasMap[water.id] || [])
      ].map((item) => String(item || "").toLowerCase()));
    }

    function cueSignalsFromText(text) {
      const lower = text.toLowerCase();
      const cues = [];
      if (lower.includes("clear")) cues.push("clear water");
      if (lower.includes("off color") || lower.includes("dirty") || lower.includes("stained")) cues.push("color/clarity note");
      if (lower.includes("good") || lower.includes("fishing well") || lower.includes("productive")) cues.push("positive human report");
      if (lower.includes("slow") || lower.includes("tough") || lower.includes("poor")) cues.push("technical human report");
      if (lower.includes("morning")) cues.push("morning window");
      if (lower.includes("evening")) cues.push("evening window");
      return uniqueItems(cues);
    }

    function scoreBoostFromSignals(text, source, hatches, flies) {
      const lower = text.toLowerCase();
      let boost = source.type === "shop" || source.type === "guide" ? .18 : .08;
      if (hatches.length) boost += .08;
      if (flies.length) boost += .06;
      if (lower.includes("fishing well") || lower.includes("good") || lower.includes("productive")) boost += .16;
      if (lower.includes("slow") || lower.includes("tough") || lower.includes("poor")) boost -= .24;
      return Math.max(-.35, Math.min(.45, boost));
    }

    function extractSignalsForWater(water, sourceText, source) {
      const lower = sourceText.toLowerCase();
      const aliases = aliasesForWater(water);
      const mentioned = aliases.some((alias) => alias.length > 3 && lower.includes(alias));
      if (!mentioned) return null;
      const hatches = hatchSignalMap
        .filter(([needle]) => lower.includes(needle))
        .map(([, hatch]) => hatch);
      const flies = flySignalMap
        .filter(([needle]) => lower.includes(needle))
        .map(([, fly]) => fly);
      const cues = cueSignalsFromText(lower);
      return {
        hatches: uniqueItems(hatches),
        flies: uniqueItems(flies),
        cues,
        sources: [source.label],
        scoreBoost: scoreBoostFromSignals(lower, source, hatches, flies)
      };
    }

    function mergeIntelSignals(current, next) {
      if (!next) return current;
      return {
        hatches: uniqueItems([...(current.hatches || []), ...(next.hatches || [])]).slice(0, 6),
        flies: uniqueItems([...(current.flies || []), ...(next.flies || [])]).slice(0, 8),
        cues: uniqueItems([...(current.cues || []), ...(next.cues || [])]).slice(0, 6),
        sources: uniqueItems([...(current.sources || []), ...(next.sources || [])]).slice(0, 6),
        scoreBoost: Math.max(-.5, Math.min(.65, (current.scoreBoost || 0) + (next.scoreBoost || 0)))
      };
    }

    async function scrubLocalResources(mode = "daily-open") {
      const sourceResults = [];
      const errors = [];
      for (const source of localIntelSources) {
        let text = "";
        let readable = false;
        try {
          text = textFromHtml(await fetchTextWithTimeout(source.url, source.label));
          readable = text.length > 80;
        } catch (error) {
          errors.push(`${source.label}: ${error.message}`);
          text = source.fallback;
        }
        sourceResults.push({
          label: source.label,
          type: source.type,
          url: source.url,
          readable,
          text: text || source.fallback
        });
      }

      const byWater = {};
      waters.forEach((water) => {
        let intel = { hatches: [], flies: [], cues: [], sources: [], scoreBoost: 0 };
        sourceResults.forEach((sourceResult) => {
          const signals = extractSignalsForWater(water, sourceResult.text, sourceResult);
          intel = mergeIntelSignals(intel, signals);
        });
        if (intel.sources.length || intel.hatches.length || intel.flies.length) byWater[water.id] = intel;
      });

      const cache = liveReports.cache || readWaterCache();
      cache.localIntel = {
        byWater,
        sources: sourceResults.map(({ label, type, url, readable }) => ({ label, type, url, readable })),
        updatedAt: new Date().toISOString(),
        mode,
        errors
      };
      cache.lastSavedAt = cache.lastSavedAt || cache.localIntel.updatedAt;
      writeWaterCache(cache);
      return cache.localIntel;
    }

    async function fetchUsgsReport(meta) {
      if (!meta.usgs) return null;
      const url = `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${meta.usgs}&parameterCd=00060,00010&siteStatus=all`;
      const json = await fetchJsonWithTimeout(url, "USGS");
      const timeSeries = json?.value?.timeSeries || [];
      let flow = null;
      let waterTemp = null;
      let observedAt = null;
      timeSeries.forEach((series) => {
        const code = series?.variable?.variableCode?.[0]?.value;
        const latest = latestUsgsValue(series);
        if (!latest) return;
        observedAt = latest.dateTime || observedAt;
        if (code === "00060") flow = `${Number(latest.value).toLocaleString()} cfs`;
        if (code === "00010") {
          const tempF = fahrenheitFromC(latest.value);
          if (tempF) waterTemp = `${tempF} F`;
        }
      });
      return { site: meta.usgs, flow, waterTemp, observedAt, url };
    }

    async function fetchNwsReport(meta) {
      const pointUrl = `https://api.weather.gov/points/${meta.lat.toFixed(4)},${meta.lon.toFixed(4)}`;
      const pointJson = await fetchJsonWithTimeout(pointUrl, "NWS points");
      const forecastUrl = pointJson?.properties?.forecastHourly || pointJson?.properties?.forecast;
      const forecastJson = await fetchJsonWithTimeout(forecastUrl, "NWS forecast");
      const period = forecastJson?.properties?.periods?.[0];
      return {
        air: period?.temperature ? `${period.temperature} F` : null,
        wind: period?.windSpeed && period?.windDirection ? `${period.windSpeed} ${period.windDirection}` : period?.windSpeed || null,
        forecast: period?.shortForecast || null,
        observedAt: period?.startTime || null,
        url: pointUrl
      };
    }

    async function refreshLiveReport(waterId, options = {}) {
      const { mode = "manual", render = true } = options;
      const water = waters.find((item) => item.id === waterId) || getWater();
      const meta = liveMetaFor(water);
      const previous = liveReports.byWater[water.id];
      liveReports.byWater[water.id] = previous?.status === "ready"
        ? { ...previous, refreshing: true, refreshError: "" }
        : { status: "loading", meta };
      liveReports.lastRequested = water.id;
      if (render) {
        renderWaters();
        bindDynamic();
      }
      try {
        const [usgsResult, nwsResult] = await Promise.allSettled([
          fetchUsgsReport(meta),
          fetchNwsReport(meta)
        ]);
        const report = {
          status: "ready",
          meta,
          updatedAt: new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }),
          usgs: usgsResult.status === "fulfilled" ? usgsResult.value : null,
          nws: nwsResult.status === "fulfilled" ? nwsResult.value : null,
          errors: [
            usgsResult.status === "rejected" ? usgsResult.reason.message : null,
            nwsResult.status === "rejected" ? nwsResult.reason.message : null
          ].filter(Boolean)
        };
        cacheReport(water.id, report, mode);
      } catch (error) {
        liveReports.byWater[water.id] = previous?.status === "ready"
          ? { ...previous, refreshing: false, refreshError: error.message }
          : { status: "error", meta, error: error.message };
      }
      if (render) {
        renderToday();
        renderWaters();
        bindDynamic();
      }
    }

    async function refreshAllWaterReports(mode = "manual") {
      if (liveReports.bulkStatus) return;
      liveReports.bulkStatus = mode;
      renderToday();
      renderWaters();
      bindDynamic();
      await scrubLocalResources(mode);
      const results = [];
      for (let index = 0; index < waters.length; index += BULK_SYNC_CONCURRENCY) {
        const batch = waters.slice(index, index + BULK_SYNC_CONCURRENCY);
        const batchResults = await Promise.allSettled(batch.map((water) => refreshLiveReport(water.id, { mode, render: false })));
        results.push(...batchResults);
      }
      if (mode === "daily-open") markDailyOpenSyncComplete();
      liveReports.bulkStatus = "";
      renderAll();
      return results;
    }

    function numberFromText(text) {
      const match = String(text || "").match(/-?\d+(\.\d+)?/);
      return match ? Number(match[0]) : null;
    }

    function liveDisplayValue(water, key) {
      const report = liveReports.byWater[water.id];
      if (report?.status !== "ready") return water[key];
      if (key === "flow") return report.usgs?.flow || water.flow;
      if (key === "temp") return report.usgs?.waterTemp || water.temp;
      if (key === "air") return report.nws?.air || water.air;
      if (key === "wind") return report.nws?.wind || water.wind;
      return water[key];
    }

    function liveRecommendedFlies(water) {
      const report = liveReports.byWater[water.id];
      const waterTemp = numberFromText(report?.usgs?.waterTemp || water.temp);
      const wind = numberFromText(report?.nws?.wind || water.wind);
      const forecast = `${report?.nws?.forecast || ""}`.toLowerCase();
      const hatchText = predictedHatches(water).join(" ").toLowerCase();
      const intel = localIntelForWater(water);
      const flies = [...intel.flies, ...water.flies];
      if (water.type === "Lake") {
        if (wind !== null && wind >= 12) flies.unshift("Balanced Leech #10");
        if (waterTemp !== null && waterTemp >= 56) flies.unshift("Damsel Nymph #12", "Callibaetis Spinner #16");
        else flies.unshift("Chromie #16", "Ice Cream Cone #16");
      } else {
        if (waterTemp !== null && waterTemp < 50) flies.unshift("BWO Emerger #18", "Zebra Midge #20");
        if (waterTemp !== null && waterTemp >= 50 && waterTemp <= 58) flies.unshift("PMD Sparkle Dun #16", "PMD Emerger #16");
        if (forecast.includes("cloud") || forecast.includes("rain")) flies.unshift("BWO Soft Hackle #18");
        if (hatchText.includes("caddis")) flies.unshift("X-Caddis #16");
      }
      return uniqueItems(flies).slice(0, 4);
    }

    function liveRecommendationReason(water) {
      const report = liveReports.byWater[water.id];
      const intel = localIntelForWater(water);
      if (!report) return "Pull live inputs to compare gauge, forecast, and report context against the demo hatch profile.";
      if (report.status === "loading") return "Checking USGS gauge and NWS forecast now.";
      if (report.status === "error") return `Live pull failed: ${report.error}`;
      if (report.refreshing) return "Updating from signal now while keeping the saved local report available.";
      const parts = [];
      if (report.usgs?.flow) parts.push(`${report.usgs.flow} from USGS`);
      if (report.usgs?.waterTemp) parts.push(`${report.usgs.waterTemp} water`);
      if (report.nws?.forecast) parts.push(`${report.nws.forecast.toLowerCase()} forecast`);
      if (report.nws?.wind) parts.push(`${report.nws.wind} wind`);
      if (intel.sources?.length) parts.push(`${intel.sources.slice(0, 2).join(" + ")} local report signal`);
      const prefix = report.fromCache ? "Using saved local data" : "Adjusted";
      const suffix = report.refreshError ? ` Last update failed: ${report.refreshError}.` : "";
      return parts.length ? `${prefix} from ${parts.join(", ")}.${suffix}` : `Forecast/report links loaded, but no gauge values were available for this water.${suffix}`;
    }

    function dataModelNotice(water) {
      const report = liveReports.byWater[water.id];
      const intel = localIntelForWater(water);
      if (report?.refreshing) return "Updating now. The app will keep using the saved local report if signal drops.";
      if (report?.status === "ready") {
        return intel.sources?.length
          ? `Stored locally on this device. Model blends USGS/NWS data with daily local report signals from ${intel.sources.slice(0, 3).join(", ")}.`
          : "Stored locally on this device. Fishability, hatch window, and fly suggestions are adjusted from USGS gauge values and the NWS forecast; local report pages are scrubbed daily when readable.";
      }
      if (report?.status === "loading") return "Pulling live USGS/NWS inputs for this prototype model.";
      return "Demo baseline: refresh live inputs to adjust this water with USGS/NWS data.";
    }

    function liveReportPanel(water) {
      const report = liveReports.byWater[water.id];
      const intel = localIntelForWater(water);
      const status = report?.refreshing ? "refreshing" : report?.status || "idle";
      const meta = report?.meta || liveMetaFor(water);
      const usgsLabel = meta.usgs ? `USGS ${meta.usgs}` : "No gauge mapped";
      const intelUpdated = liveReports.cache?.localIntel?.updatedAt ? formatSavedTime(liveReports.cache.localIntel.updatedAt) : "Not scrubbed yet";
      const updated = report?.cachedAt ? `Saved locally ${formatSavedTime(report.cachedAt)}` : report?.updatedAt ? `Updated ${report.updatedAt}` : "Not pulled yet";
      const rows = report?.status === "ready" ? `
        <div class="line-row"><span>Gauge</span><b>${usgsLabel}${report.usgs?.flow ? ` - ${report.usgs.flow}` : ""}${report.usgs?.waterTemp ? ` - ${report.usgs.waterTemp}` : ""}</b></div>
        <div class="line-row"><span>Forecast</span><b>${report.nws?.air || "Air n/a"} - ${report.nws?.wind || "Wind n/a"}${report.nws?.forecast ? ` - ${report.nws.forecast}` : ""}</b></div>
        <div class="line-row"><span>Local intel</span><b>${intel.sources?.length ? `${intel.sources.join(" + ")} - ${uniqueItems([...intel.hatches, ...intel.flies]).slice(0, 4).join(", ")}` : `Daily scrub saved ${intelUpdated}`}</b></div>
        ${(report.errors || []).length ? `<div class="line-row"><span>Gaps</span><b>${report.errors.join(" / ")}</b></div>` : ""}
        ${report.refreshError ? `<div class="line-row"><span>Last update</span><b>${report.refreshError}</b></div>` : ""}
      ` : `
        <div class="line-row"><span>Gauge</span><b>${usgsLabel}</b></div>
        <div class="line-row"><span>Forecast point</span><b>${meta.lat.toFixed(2)}, ${meta.lon.toFixed(2)}</b></div>
      `;
      return `
        <div class="live-panel">
          <div class="panel-head">
            <div>
              <h3>Saved Report Inputs</h3>
              <p class="subtle">${updated} - ${status === "loading" ? "Loading live sources..." : liveRecommendationReason(water)}</p>
            </div>
            <button class="ghost-btn" data-refresh-live="${water.id}">${status === "loading" || status === "refreshing" ? "Updating..." : "Update"}</button>
          </div>
          ${rows}
          <p class="model-note">${dataModelNotice(water)}</p>
          <div class="source-links">
            ${reportLinks.map(([label, url]) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`).join("")}
          </div>
        </div>
      `;
    }

    function hatchProfileFor(name) {
      const key = name.toLowerCase();
      if (key.includes("bwo") || key.includes("blue")) return hatchProfiles.bwo;
      if (key.includes("pmd") || key.includes("pale")) return hatchProfiles.pmd;
      if (key.includes("drake")) return hatchProfiles.greenDrake;
      if (key.includes("callibaetis")) return hatchProfiles.callibaetis;
      if (key.includes("chironomid")) return hatchProfiles.chironomid;
      if (key.includes("midge")) return hatchProfiles.midge;
      if (key.includes("october")) return hatchProfiles.octoberCaddis;
      if (key.includes("sally")) return hatchProfiles.yellowSally;
      if (key.includes("caddis") || key.includes("sedge")) return hatchProfiles.caddis;
      if (key.includes("damsel")) return hatchProfiles.damsel;
      if (key.includes("terrestrial") || key.includes("hopper") || key.includes("ant") || key.includes("beetle") || key.includes("cricket")) return hatchProfiles.terrestrial;
      if (key.includes("baitfish") || key.includes("minnow") || key.includes("sculpin") || key.includes("streamer") || key.includes("clouser") || key.includes("muddler") || key.includes("zonker") || key.includes("kreelex")) return hatchProfiles.baitfish;
      if (key.includes("leech") || key.includes("bugger")) return hatchProfiles.leech;
      if (key.includes("stone") || key.includes("salmonfly") || key.includes("golden")) return hatchProfiles.stonefly;
      return { ...hatchProfiles.caddis, label: name, size: "12-16", trigger: "active feeding" };
    }

    function hatchThumbStyle(profile, stage = 2) {
      const bug = bugs.find((item) => item.id === profile.bugId) || bugs[0];
      return bugImageStyle(bug, stage);
    }

    function stageFlyStyle(ref) {
      return `background-image:url('${ref.plate}');background-position:${ref.pos};background-size:${ref.size || "200% 200%"};`;
    }

    function flyLibraryForBug(bugId, stageName = null) {
      const normalizedStage = String(stageName || "").toLowerCase();
      return flyLibrary.filter((fly) => {
        if (fly.bugId !== bugId) return false;
        if (!normalizedStage) return true;
        const flyStage = fly.stage.toLowerCase();
        if (normalizedStage.includes(flyStage) || flyStage.includes(normalizedStage)) return true;
        if (normalizedStage.includes("larva") && flyStage.includes("pupa")) return true;
        if (normalizedStage.includes("pupa") && flyStage.includes("larva")) return true;
        if (normalizedStage.includes("mature") && flyStage.includes("nymph")) return true;
        if (normalizedStage.includes("swimming") && flyStage.includes("nymph")) return true;
        if (normalizedStage.includes("dry") && flyStage.includes("adult")) return true;
        return false;
      });
    }

    function flyReferenceForLibraryItem(item) {
      return artificialFlyRefsByName[item?.name] || item?.ref || flyRefFor(item?.name || "");
    }

    function selectedFlyFrom(items) {
      return items.find((item) => item.name === activeFlyName) || items[0] || flyLibrary[0];
    }

    function findLibraryFlyByName(name) {
      const text = String(name || "").toLowerCase();
      return flyLibrary.find((fly) => fly.name.toLowerCase() === text)
        || flyLibrary.find((fly) => fly.name.toLowerCase().includes(text) || text.includes(fly.name.toLowerCase()));
    }

    function flyRefFor(name) {
      const text = name.toLowerCase();
      if (artificialFlyRefsByName[name]) return artificialFlyRefsByName[name];
      const exact = findLibraryFlyByName(name);
      if (exact) return flyReferenceForLibraryItem(exact);
      if (text.includes("clouser") || text.includes("zonker") || text.includes("minnow")) return text.includes("sparkle") || text.includes("kreelex") ? flyRefs.sparkleMinnowFly : flyRefs.clouserMinnowFly;
      if (text.includes("muddler") || text.includes("sculpin") || text.includes("sculpzilla")) return flyRefs.muddlerMinnowFly;
      if (text.includes("baby rainbow") || text.includes("juvenile trout")) return flyRefs.babyRainbowFly;
      if (text.includes("hopper")) return text.includes("parachute") ? flyRefs.parachuteHopperFly : flyRefs.morrishHopperFly;
      if (text.includes("ant")) return flyRefs.foamAntFly;
      if (text.includes("beetle") || text.includes("terrestrial")) return flyRefs.foamBeetleFly;
      if (text.includes("cricket")) return flyRefs.foamAntFly;
      if (text.includes("chubby")) return text.includes("stone") ? flyRefs.chubbyStoneFly : flyRefs.chubbyChernobylFly;
      if (text.includes("stimulator") || text.includes("sally")) return flyRefs.yellowStimulatorFly;
      if (text.includes("stone") || text.includes("rubber") || text.includes("pat")) return flyRefs.patsRubberLegsFly;
      if (text.includes("x-caddis") || text.includes("tan caddis")) return flyRefs.xCaddisFly;
      if (text.includes("elk") || text.includes("cdc")) return flyRefs.elkHairCaddisFly;
      if (text.includes("caddis") || text.includes("sedge")) return text.includes("pupa") ? flyRefs.orangeSedgeFly : flyRefs.xCaddisFly;
      if (text.includes("drake")) return text.includes("cripple") ? flyRefs.greenDrakeCrippleFly : flyRefs.greenDrakeDunFly;
      if (text.includes("bwo") && text.includes("comparadun")) return flyRefs.bwoComparadunFly;
      if (text.includes("pmd") || text.includes("sparkle") || text.includes("comparadun") || text.includes("dun") || text.includes("parachute") || text.includes("adams")) return text.includes("parachute") || text.includes("adams") ? flyRefs.parachuteAdamsFly : flyRefs.pmdSparkleDunFly;
      if (text.includes("rs2") || text.includes("bwo")) return flyRefs.rs2Fly;
      if (text.includes("emerger") || text.includes("soft hackle") || text.includes("split case")) return flyRefs.pmdEmergerFly;
      if (text.includes("ice cream")) return flyRefs.iceCreamConeFly;
      if (text.includes("zebra")) return flyRefs.zebraMidgeFly;
      if (text.includes("midge") || text.includes("chironomid") || text.includes("black midge")) return text.includes("chromie") ? flyRefs.chromieFly : flyRefs.blackChironomidFly;
      if (text.includes("damsel")) return text.includes("marabou") ? flyRefs.marabouDamselFly : flyRefs.damselNymphFly;
      if (text.includes("leech") || text.includes("balanced")) return text.includes("balanced") ? flyRefs.balancedLeechFly : flyRefs.oliveLeechFly;
      if (text.includes("bugger") || text.includes("willy") || text.includes("streamer")) return flyRefs.woollyBuggerFly;
      if (text.includes("pheasant")) return flyRefs.pheasant;
      if (text.includes("hare")) return flyRefs.hares;
      return flyRefs.parachuteAdamsFly;
    }

    function flyCard(fly, subtext) {
      const ref = flyRefFor(fly);
      return `
        <div class="fly" data-fly-name="${fly}">
          <div class="fly-photo" style="background-image:url('${ref.plate}');background-position:${ref.pos};background-size:${ref.size || "200% 200%"};" role="img" aria-label="${fly} artificial fly reference"></div>
          <div>
            <strong>${fly}</strong>
            <div class="subtle">${subtext}</div>
            <div class="subtle">${ref.cue}</div>
          </div>
        </div>
      `;
    }

    function waterAccordionDetail(water) {
      const flies = liveRecommendedFlies(water);
      const hatches = predictedHatches(water);
      const liveSource = liveReports.byWater[water.id]?.status === "ready" ? "USGS/NWS + local report cache" : water.source;
      return `
        <div class="accordion-detail">
          <div class="metric-grid">
            <div class="metric"><span>Flow</span><strong>${liveDisplayValue(water, "flow")}</strong></div>
            <div class="metric"><span>Water</span><strong>${liveDisplayValue(water, "temp")}</strong></div>
            <div class="metric"><span>Air</span><strong>${liveDisplayValue(water, "air")}</strong></div>
            <div class="metric"><span>Wind</span><strong>${liveDisplayValue(water, "wind")}</strong></div>
            <div class="metric"><span>Distance</span><strong>${distanceLabel(water) || "Use location"}</strong></div>
          </div>
          ${liveReportPanel(water)}
          <div>
            <h3>${water.name} Detail</h3>
            <p class="subtle">${water.read}</p>
          </div>
          <div class="line-row"><span>Regulations</span><b>${water.regs}</b></div>
          <div class="line-row"><span>Stocking</span><b>${water.stocking}</b></div>
          <div class="line-row"><span>Source</span><b>${liveSource}</b></div>
          <div>
            <h3>Fly Match</h3>
            <p class="subtle">${liveRecommendationReason(water)}</p>
            <div class="fly-stack">${flies.map((fly) => flyCard(fly, hatches.join(" / "))).join("")}</div>
          </div>
        </div>
      `;
    }

    function selectedWaterFly(water) {
      const flies = liveRecommendedFlies(water);
      const activeFly = activeWaterFlyByWater[water.id];
      return flies.includes(activeFly) ? activeFly : flies[0];
    }

    function waterRankCard(water, rank, isTop = false) {
      const flies = liveRecommendedFlies(water);
      const selectedFly = selectedWaterFly(water);
      const ref = flyRefFor(selectedFly);
      const cardClass = isTop ? "top-water-card selectable" : "water-card ranked-water-card selectable";
      const score = fishScore(water);
      const sortScore = rankedScore(water);
      const hatches = predictedHatches(water);
      const distance = distanceLabel(water);
      const isExpanded = water.id === activeWater;
      return `
        <div class="${cardClass} ${water.id === activeWater ? "active" : ""}" data-water="${water.id}">
          <div class="water-card-main">
            <div class="water-top">
              <div>
                <div class="water-rank-label">${isTop ? "Top Water Today" : `#${rank} Today`}</div>
                ${isTop ? `<h2>${water.name}</h2>` : `<strong>${water.name}</strong>`}
                <div class="subtle">${water.section}</div>
              </div>
              <span class="chip ${water.type === "Lake" ? "blue" : ""}">${water.type}</span>
            </div>
            <div class="chips">${hatches.map((hatch) => `<span class="chip copper">${hatch}</span>`).join("")}</div>
            <div class="water-fly-badges" aria-label="${water.name} recommended flies">
              ${flies.map((fly) => `<button class="water-fly-badge ${fly === selectedFly ? "active" : ""}" data-water-fly="${fly}" data-water-id="${water.id}">${fly}</button>`).join("")}
            </div>
            <div class="line-row"><span>${waterSortMode === "Near" && userLocation ? "Nearby rank" : "Fishability"}</span><b>${waterSortMode === "Near" && userLocation ? `${sortScore.toFixed(1)} (${score})` : score}</b></div>
            ${distance ? `<div class="line-row"><span>Distance</span><b>${distance}</b></div>` : ""}
            <div class="subtle">${scoreSourceLabel(water)}</div>
          </div>
          <div class="water-fly-preview" style="background-image:url('${ref.plate}');background-position:${ref.pos};background-size:${ref.size || "200% 200%"};" role="img" aria-label="${selectedFly} artificial fly reference"></div>
          ${isExpanded ? waterAccordionDetail(water) : ""}
        </div>
      `;
    }

    function renderToday() {
      const best = getHomeWater();
      const score = fishScore(best);
      const clarity = clarityFor(best);
      const scoreDeg = Math.round(Number(score) * 36);
      const liveFlow = liveDisplayValue(best, "flow");
      const liveTemp = liveDisplayValue(best, "temp");
      const liveWind = liveDisplayValue(best, "wind");
      const flowValue = liveFlow.replace(" cfs", "");
      const flowUnit = liveFlow.includes("cfs") ? "CFS" : "";
      const currentHatches = predictedHatches(best);
      const hatches = currentHatches.slice(0, 3).map((hatch, index) => {
        const profile = hatchProfileFor(hatch);
        const status = index === 0 ? "NOW" : index === 1 ? "PEAK" : "SOON";
        const statusClass = status.toLowerCase();
        return `
          <div class="hatch-row">
            <div class="hatch-thumb" style="${hatchThumbStyle(profile, index === 2 ? 1 : 2)}" role="img" aria-label="${profile.label} reference"></div>
            <div>
              <strong>${profile.label}</strong>
              <span>Size ${profile.size} - ${profile.trigger}</span>
            </div>
            <div class="status-pill ${statusClass}">${status}</div>
          </div>
        `;
      }).join("");
      const benchGroups = currentHatches.slice(0, 3).map((hatch) => {
        const profile = hatchProfileFor(hatch);
        return `
          <div class="bench-group">
            <h3>${profile.label}</h3>
            <div class="bench-stage-row">
              ${profile.stages.map(([stage, fly, ref]) => `
                <div class="bench-stage">
                  <div class="bench-stage-image" style="${stageFlyStyle(ref)}" role="img" aria-label="${fly} artificial fly"></div>
                  <b>${stage}</b>
                  <span>${fly}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");

      $("#today").innerHTML = `
        <div class="today-screen">
          <section class="today-hero">
            <div class="home-water-control">
              <label for="home-water-select">Home Water</label>
              <select id="home-water-select" data-home-water aria-label="Choose home water">
                ${waters.map((water) => `<option value="${water.id}" ${water.id === best.id ? "selected" : ""}>${water.name} - ${water.section}</option>`).join("")}
              </select>
            </div>
            <h1 class="prime-title">${primeWindowFor(best)}</h1>
            <div class="condition-line">${liveTemp} water - ${liveWind} - ${clarity.label}</div>
            <div class="fishability-card">
              <div class="score-ring" style="--score-deg:${scoreDeg}deg"><strong>${score}</strong></div>
              <div class="fishability-copy">
                <strong>${fishabilitySummary(best)}</strong>
                <span>${fishabilityReason(best)}</span>
                <small>${scoreSourceLabel(best)}</small>
              </div>
            </div>
          </section>

          <section class="today-body">
            <div class="condition-cards">
              <div class="condition-card">
                <strong>${liveTemp}</strong>
                <span>Water</span>
                <small>▲ 2° since dawn</small>
              </div>
              <div class="condition-card">
                <strong>${flowValue}${flowUnit ? `<small style="font-size:.5em;background:transparent;padding:0;color:#65716d;">${flowUnit}</small>` : ""}</strong>
                <span>Flow</span>
                <small>steady</small>
              </div>
              <div class="condition-card">
                <strong>${clarity.inches}</strong>
                <span>Clarity</span>
                <small>▼ ${clarity.trend}</small>
              </div>
            </div>

            <h2 class="section-title">Hatching Now</h2>
            <div class="hatch-card">${hatches}</div>

            <h2 class="section-title">Today's Fly Box <em>AI-matched</em></h2>
            <div class="bench-card">
              <div class="bench-grid">${benchGroups}</div>
            </div>
          </section>
        </div>
      `;
    }

    function renderWaters() {
      const baseSelected = getWater();
      const query = waterQuery.trim().toLowerCase();
      const filtered = waters.filter((water) => {
        const matchesType = waterFilter === "All" || water.type === waterFilter;
        const searchable = `${water.name} ${water.section} ${water.hatch.join(" ")} ${predictedHatches(water).join(" ")}`.toLowerCase();
        return matchesType && (!query || searchable.includes(query));
      }).sort((a, b) => {
        const scoreDelta = rankedScore(b) - rankedScore(a);
        if (Math.abs(scoreDelta) > .05) return scoreDelta;
        if (waterSortMode === "Near" && userLocation) return (distanceToWater(a) ?? 9999) - (distanceToWater(b) ?? 9999);
        return Number(fishScore(b)) - Number(fishScore(a));
      });
      const topWater = filtered[0] || baseSelected;
      const rankedRest = filtered.slice(1);
      const selected = filtered.find((water) => water.id === activeWater) || topWater;
      activeWater = selected.id;
      const syncing = Boolean(liveReports.bulkStatus);

      $("#waters").innerHTML = `
        <div class="topbar">
          <div>
            <p class="eyebrow">Waters</p>
            <h1>${topWater.name}</h1>

            <p class="subtle">${syncing ? "Updating local cache for all waters..." : cacheSummary()}</p>
            <p class="subtle">${locationSummary()}</p>

            <div class="segmented">
