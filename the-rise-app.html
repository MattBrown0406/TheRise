            </div>
            <div class="segmented">
              ${["All", "River", "Lake"].map((label) => `<button class="${waterFilter === label ? "active" : ""}" data-water-filter="${label}">${label}</button>`).join("")}
            </div>
            <label style="width: min(260px, 100%);">
              <span class="subtle">Search</span>
              <input data-water-search value="${waterQuery}" placeholder="Name, hatch, section">
            </label>
          </div>
        </div>
        ${waterRankCard(topWater, 1, true)}
        <div class="content-grid waters-accordion-grid">
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2>Ranked Waters</h2>
                <p class="subtle">${filtered.length} visible, sorted by ${waterSortMode === "Near" && userLocation ? "fishability plus proximity." : "today's 1-10 fishability rating."}</p>
              </div>
            </div>
            <div class="water-list">
              ${rankedRest.length ? rankedRest.map((water, index) => waterRankCard(water, index + 2)).join("") : `<p class="subtle">No additional waters match this filter.</p>`}
            </div>
          </div>
        </div>
      `;
    }

    function bugImageStyle(bug, stageIndex = null) {
      if (bug.id === "caddis" && stageIndex === 2) {
        return "background-image:url('bug-plates/caddis-adult-stage.png');background-size:contain;background-position:center;";
      }
      const positions = ["0% 0%", "100% 0%", "0% 100%", "100% 100%"];
      const size = stageIndex === null ? "contain" : "200% 200%";
      const position = stageIndex === null ? "center" : positions[stageIndex];
      return `background-image:url('${bug.plate}');background-size:${size};background-position:${position};`;
    }

    function stageCard(bug, stage, index) {
      const parts = stage.split(": ");
      const stageName = parts[0];
      const isActive = activeBugStage === stageName;
      return `
        <button class="stage stage-button ${isActive ? "active" : ""}" data-bug-stage="${stageName}">
          <div class="bug-stage-photo" style="${bugImageStyle(bug, index)}" role="img" aria-label="${bug.name} ${parts[0]} stage"></div>
          <b>${parts[0]}</b>
          <span>${parts[1]}</span>
        </button>
      `;
    }

    function bugStageStrip(bug) {
      return `
        <div class="bug-stage-strip" aria-label="${bug.name} life stages">
          ${bug.stages.map((stage, index) => {
            const parts = stage.split(": ");
            return `

    function knotSvg(step) {
      const knot = getKnot();
      if (knot.id === "improved-clinch") {
        return improvedClinchInstructionSvg(step);
      }
      const line = (d, extra = "") => `
        <path class="line-under ${extra}" d="${d}"/>
        <path class="line-core ${extra}" d="${d}"/>
        <path class="line-ribs ${extra}" d="${d}"/>
      `;
      const oval = (cx, cy, rx, ry, extra = "") => `
        <ellipse class="line-under ${extra}" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"/>
        <ellipse class="line-core ${extra}" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"/>
        <ellipse class="line-ribs ${extra}" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"/>
      `;
      const hook = (x = 26, y = 76, scale = 1) => `
        <g transform="translate(${x} ${y}) scale(${scale})">
          <path class="hook" d="M116 40 C61 26 18 52 18 91 C18 127 53 144 82 125 C94 117 100 105 102 93 L79 93 C75 105 62 111 49 104 C34 96 36 75 52 68 C69 61 92 66 116 80"/>
          <ellipse class="hook-eye" cx="127" cy="88" rx="22" ry="15"/>
          <ellipse class="hook-hole" cx="127" cy="88" rx="10" ry="6"/>
        </g>
      `;
      const arrow = (d) => `<path class="red-arrow" d="${d}" marker-end="url(#knotArrow)"/>`;
      const pull = (d) => `<path class="pull-arrow" d="${d}" marker-end="url(#pullArrow)"/>`;
      const wraps = (startX, y, count = 5) => Array.from({ length: count }, (_, index) => {
        const cx = startX + index * 18;
        return oval(cx, y, 12, 20, "wrap");
      }).join("");
      const caption = (text, x, y, maxChars = 30) => {
        const words = text.split(" ");
        const lines = [];
        let current = "";
        words.forEach((word) => {
          const next = current ? `${current} ${word}` : word;
          if (next.length > maxChars && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        });
        if (current) lines.push(current);
        return `<text class="panel-copy" x="${x}" y="${y}">${lines.map((lineText, index) => `<tspan x="${x}" dy="${index ? 23 : 0}">${lineText}</tspan>`).join("")}</text>`;
      };

      const improvedClinchPanels = [
        () => `
          ${hook(20, 80, .9)}
          ${line("M136 159 H388")}
          ${line("M136 159 C166 115 244 88 330 52")}
          ${arrow("M338 55 C358 89 352 119 333 144")}
        `,
        () => `
          ${hook(20, 76, .9)}
          ${line("M136 155 H394")}
          ${line("M138 155 C176 184 212 185 238 156")}
          ${wraps(248, 155, 5)}
          ${line("M337 155 C363 135 383 128 405 127")}
          ${arrow("M382 58 C348 75 334 98 336 126")}
        `,
        () => `
          ${hook(20, 76, .9)}
          ${line("M136 155 H394")}
          ${wraps(222, 155, 5)}
          ${line("M314 155 C279 196 214 196 151 160")}
          <circle class="target" cx="145" cy="158" r="22"/>
          ${arrow("M304 204 C247 202 185 185 153 164")}
        `,
        () => `
          ${hook(20, 76, .9)}
          ${line("M136 155 H394")}
          ${wraps(222, 155, 5)}
          ${line("M316 156 C275 220 196 223 148 164")}
          ${line("M151 164 C214 105 286 106 330 158")}
          <ellipse class="target" cx="238" cy="164" rx="92" ry="62"/>
          ${arrow("M318 216 C283 205 257 187 241 170")}
        `,
        () => `
          ${hook(24, 44, .82)}
          ${line("M134 117 H810")}
          ${wraps(168, 117, 5)}
          ${line("M134 117 C167 138 220 139 274 118")}
          ${pull("M142 117 H76")}
          ${pull("M565 117 H635")}
          ${arrow("M292 165 C323 159 345 148 363 127")}
        `
      ];

      const genericPanels = {
        "non-slip-loop": [
          () => `${hook(20, 76, .9)}${line("M137 155 H394")}${oval(230, 155, 68, 48)}${arrow("M285 84 C316 100 331 122 329 149")}`,
          () => `${hook(20, 76, .9)}${line("M137 155 H394")}${oval(230, 155, 68, 48)}${line("M296 155 C330 133 363 130 394 139")}${arrow("M376 104 C338 112 314 130 298 151")}`,
          () => `${hook(20, 76, .9)}${line("M137 155 H394")}${oval(230, 155, 68, 48)}${wraps(284, 155, 4)}${arrow("M371 204 C332 223 280 209 252 173")}`,
          () => `${hook(20, 76, .9)}${line("M137 155 H394")}${oval(255, 155, 96, 55)}${wraps(278, 155, 3)}${pull("M139 155 H86")}${pull("M394 155 H430")}`
        ],
        "blood-knot": [
          () => `${line("M36 120 H390")}${line("M390 170 H36")}${caption("Overlap both line ends", 94, 73, 24)}`,
          () => `${line("M36 120 H390")}${line("M390 170 H36")}${wraps(152, 120, 5)}${arrow("M130 64 C188 43 252 64 279 111")}`,
          () => `${line("M36 120 H390")}${line("M390 170 H36")}${wraps(152, 120, 4)}${wraps(200, 170, 4)}<circle class="target" cx="214" cy="145" r="19"/>${arrow("M300 217 C254 229 222 202 215 151")}`,
          () => `${line("M36 145 H390")}${wraps(154, 145, 6)}${pull("M40 145 H0")}${pull("M390 145 H430")}`
        ],
        surgeons: [
          () => `${line("M34 128 H392")}${line("M34 166 H392")}${caption("Lay leader and tippet together", 74, 78, 27)}`,
          () => `${line("M66 148 C130 66 260 66 324 148 C260 230 130 230 66 148")}${line("M70 148 H394")}${arrow("M326 91 C289 61 188 65 121 131")}`,
          () => `${line("M66 148 C130 66 260 66 324 148 C260 230 130 230 66 148")}${line("M70 148 H394")}${oval(204, 148, 94, 43)}${arrow("M341 205 C284 237 179 220 117 165")}`,
          () => `${line("M34 146 H392")}${line("M64 166 H362")}${wraps(176, 146, 4)}${pull("M35 146 H0")}${pull("M392 146 H430")}`
        ],
        "perfection-loop": [
          () => `${line("M34 154 H392")}${line("M145 154 C181 82 292 82 328 154")}${arrow("M287 83 C318 100 334 123 330 151")}`,
          () => `${line("M34 154 H392")}${oval(242, 154, 88, 58)}${line("M231 154 C278 106 355 113 376 178")}`,
          () => `${line("M34 154 H392")}${oval(242, 154, 88, 58)}${line("M231 154 C278 106 355 113 376 178 C332 176 288 193 249 220")}<circle class="target" cx="330" cy="154" r="20"/>${arrow("M389 105 C356 113 337 130 331 150")}`,
          () => `${line("M34 154 H392")}${oval(270, 154, 110, 62)}${wraps(252, 154, 3)}${pull("M35 154 H0")}${pull("M380 154 H430")}`
        ]
      };

      const boardPanels = knot.id === "improved-clinch" ? improvedClinchPanels : genericPanels[knot.id] || genericPanels["non-slip-loop"];
      const isFivePanel = boardPanels.length === 5;
      const panelPositions = isFivePanel
        ? [[26, 106, 430, 178], [504, 106, 430, 178], [26, 314, 430, 178], [504, 314, 430, 178], [26, 522, 908, 168]]
        : [[26, 112, 430, 236], [504, 112, 430, 236], [26, 388, 430, 236], [504, 388, 430, 236]];
      const viewHeight = isFivePanel ? 720 : 650;
      const panel = (draw, index) => {
        const [x, y, width, height] = panelPositions[index];
        const active = index === step ? " active" : "";
        const scale = width > 500 ? 1.05 : 1;
        return `
          <g transform="translate(${x} ${y})">
            <rect class="instruction-panel${active}" width="${width}" height="${height}" rx="12"/>
            <circle class="step-dot" cx="28" cy="33" r="17"/>
            <text class="step-num" x="28" y="40">${index + 1}</text>
            ${caption(knot.steps[index], 56, 29, width > 500 ? 50 : 28)}
            <g transform="translate(0 ${width > 500 ? 35 : 28}) scale(${scale})">
              ${draw()}
            </g>
          </g>
        `;
      };

      return `
        <svg viewBox="0 0 960 ${viewHeight}" aria-label="${knot.name} knot instruction diagram" role="img">
          <defs>
            <marker id="knotArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
              <path d="M0 0 L12 6 L0 12 Z" fill="#d33b37"/>
            </marker>
            <marker id="pullArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">

            </marker>

              <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#162019" flood-opacity=".16"/>
            </filter>
            <style>
              .board-title,.panel-copy,.step-num{font-family:Inter,system-ui,sans-serif}
              .board-title{fill:#111815;font-size:42px;font-weight:900}
              .instruction-panel{fill:#fff;stroke:#ddd8cf;stroke-width:2}
              .instruction-panel.active{stroke:#d6a94a;stroke-width:5}
              .step-dot{fill:#b8b8b8;stroke:#898989;stroke-width:1}
              .step-num{fill:#111815;font-size:24px;font-weight:850;text-anchor:middle}
              .panel-copy{fill:#111815;font-size:23px;font-weight:650}
              .hook{fill:#353733;stroke:#111815;stroke-width:4;filter:url(#knotShadow)}

          <text class="board-title" x="26" y="62">${knot.name} Instructions</text>
          <path d="M26 82 H934" stroke="#111815" stroke-width="2"/>

            <h2>${selected.steps[knotStep]}</h2>
            <p class="subtle">${selected.note}</p>
            <div class="chips">${selected.steps.map((_, index) => `<span class="chip ${index === knotStep ? "copper" : ""}">Step ${index + 1}</span>`).join("")}</div>
          </div>
        </div>
      `;
    }

    function getLogs() {
      try {
        const saved = localStorage.getItem("riseLogs");
        return saved ? JSON.parse(saved) : sampleLogs;
      } catch (error) {
        return sampleLogs;
      }
    }

    function setLogs(logs) {
      localStorage.setItem("riseLogs", JSON.stringify(logs));
    }

    function flyFamilyName(fly) {
      const text = String(fly || "").toLowerCase();
      if (text.includes("caddis") || text.includes("x-caddis")) return "Caddis";
      if (text.includes("bwo")) return "BWO";
      if (text.includes("pmd")) return "PMD";
      if (text.includes("damsel")) return "Damsel";
      if (text.includes("chironomid") || text.includes("midge") || text.includes("chromie")) return "Midge";
      if (text.includes("leech") || text.includes("bugger")) return "Leech";
      if (text.includes("callibaetis")) return "Callibaetis";
      return String(fly || "Caddis").replace(/\s?#\d+/, "");
    }

    function renderLog() {
      const logs = getLogs();
      const hasSavedLogs = localStorage.getItem("riseLogs") !== null;
      const totalFish = hasSavedLogs ? logs.reduce((sum, entry) => sum + (Number(entry.count) || 1), 0) : 34;
      const trips = hasSavedLogs ? new Set(logs.map((entry) => `${entry.date}-${entry.waterName}`)).size : 11;
      const flyCounts = logs.reduce((counts, entry) => {
        counts[entry.fly] = (counts[entry.fly] || 0) + 1;
        return counts;
      }, {});
      const topFly = flyFamilyName(Object.entries(flyCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "Caddis");
      const editingEntry = editingLogIndex !== null ? logs[editingLogIndex] : null;
      const selectedWater = editingEntry?.waterId ? (waters.find((water) => water.id === editingEntry.waterId) || getWater()) : getWater();
      $("#log").innerHTML = `
        <div class="log-screen">
          <div class="log-top">
            <div>
              <p class="eyebrow">Your Log - 2026</p>
              <h1>Catch Journal</h1>
              <p class="subtle">Photos, fish, flies, length, and conditions saved locally on this device.</p>
            </div>
            <button class="primary-btn" data-new-log>${icon.plus}${logFormOpen ? "Close Entry" : "New Entry"}</button>
          </div>

          <div class="log-summary">
            <div class="log-stat"><strong>${totalFish}</strong><span>Fish</span></div>
            <div class="log-stat"><strong>${trips}</strong><span>Trips</span></div>
            <div class="log-stat"><strong>${topFly}</strong><span>Top Fly</span></div>
          </div>

          ${logFormOpen ? `
            <form class="log-form-panel" id="logForm">
              <div class="panel-head">
                <div>
                  <h2>${editingEntry ? "Edit Catch" : "Log a Catch"}</h2>
                  <p class="subtle">Use the camera button on mobile, or attach a photo from your library.</p>
                </div>
              </div>
              <label class="photo-input">Photo
                <input name="photo" type="file" accept="image/*" capture="environment">
              </label>
              <div class="form-grid">
                <label>Water
                  <select name="water">${waters.map((water) => `<option value="${water.id}" ${water.id === selectedWater.id ? "selected" : ""}>${water.name}</option>`).join("")}</select>
                </label>
                <label>Native fish
                  <select name="fish">${nativeFish.map((fish) => `<option value="${fish}" ${fish === (editingEntry?.fish || "Redband Trout") ? "selected" : ""}>${fish}</option>`).join("")}</select>
                </label>
                <label>Length
                  <input name="length" type="number" min="0" step="0.25" value="${editingEntry?.length || "17"}">
                </label>
                <label>Count
                  <input name="count" type="number" min="1" value="${editingEntry?.count || "1"}">
                </label>
                <label>Fly
                  <input name="fly" value="${editingEntry?.fly || selectedWater.flies[0]}" autocomplete="off">
                </label>
                <label>Time
                  <input name="time" value="${editingEntry?.time || new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}" autocomplete="off">
                </label>
                <label class="span-2">Notes
                  <textarea name="notes">${editingEntry?.notes || "Took in the inside seam after switching size."}</textarea>
                </label>
              </div>
              ${editingEntry?.photo ? `<input type="hidden" name="existingPhoto" value="${editingEntry.photo}">` : ""}
              <button class="primary-btn" type="submit">${icon.save}${editingEntry ? "Update Catch" : "Save Catch"}</button>
            </form>
          ` : ""}

          <div class="log-entry-list">
            ${logs.length ? logs.map((entry, index) => `
              <div class="catch-card">
                <div class="catch-photo">${entry.photo ? `<img src="${entry.photo}" alt="${entry.fish} catch photo">` : "🐟"}</div>
                <div>
                  <strong>${entry.fish}${entry.length ? ` - ${entry.length}"` : ""}</strong>
                  <span>${entry.waterName} - ${entry.fly}</span>
                  <span>${entry.date} - ${entry.time || "AM"} - ${entry.temp}</span>
                  ${entry.notes ? `<span>${entry.notes}</span>` : ""}
                  <div class="catch-actions">
                    <button class="mini-btn" data-edit-log="${index}">Edit</button>
                    <button class="mini-btn danger" data-delete-log="${index}">Delete</button>
                  </div>
                </div>
              </div>
            `).join("") : `<div class="catch-card"><div class="catch-photo">🐟</div><div><strong>No catches yet</strong><span>Tap New Entry to log your first fish.</span></div></div>`}
          </div>
            </div>
        </div>
      `;
    }

    function renderPro() {
      const isAnnual = billing === "annual";
      $("#pro").innerHTML = `
        <div class="topbar">
          <div>
            <p class="eyebrow">Pro</p>
            <h1>Alerts and deeper reads</h1>
            <p class="subtle">Hatch timing, stocking alerts, flow history, and bug-to-fly matching.</p>
          </div>
          <div class="toolbar">
            <span class="subtle">Monthly</span>
            <button class="toggle ${isAnnual ? "" : "monthly"}" data-billing aria-label="Toggle billing"></button>
            <span class="subtle">Annual</span>
          </div>
        </div>
        <div class="pro-layout">
          <div class="pro-hero">
            <p class="eyebrow">7 day trial</p>
            <h1>The Rise Pro</h1>
            <div class="price"><strong>${isAnnual ? "$49.99" : "$6.99"}</strong><span>${isAnnual ? "per year" : "per month"}</span></div>
            <button class="primary-btn">${icon.bell}Start Trial</button>
          </div>
          <div class="panel">
            <h2>Unlocked</h2>
            <div class="water-list">
              ${[
                ["Stocking alerts", "Saved stillwaters notify when ODFW updates move from scheduled to completed."],
                ["Hatch alerts", "Condition windows flag likely BWO, PMD, caddis, and chironomid events."],
                ["Prime windows", "Daily scores explain when weather, clarity, and hatches line up."],
                ["Bug to fly match", "Side-by-side hatch photos and local fly patterns."],
                ["Flow history", "Trend lines compare today's read against recent fishable windows."]
              ].map((item) => `
                <div class="water-card">
                  <div class="item-top"><strong>${item[0]}</strong><span class="chip">Pro</span></div>
                  <div class="subtle">${item[1]}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderAll() {
      renderToday();
      renderWaters();
      renderBugs();
      renderLog();
      renderPro();
      bindDynamic();
    }

    function runInitialDataSync() {
      if (navigator.onLine === false) return;
      if (shouldRunDailyOpenSync()) {
        refreshAllWaterReports("daily-open");
      } else if (!liveReports.byWater[activeWater]) {
        refreshLiveReport(activeWater, { mode: "startup" });
      }
    }

    function checkDailyOpenSync() {
      if (navigator.onLine === false || liveReports.bulkStatus) return;
      if (shouldRunDailyOpenSync()) refreshAllWaterReports("daily-open");
    }

    function startDailyOpenSyncWatcher() {
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) checkDailyOpenSync();
      });
      window.addEventListener("online", checkDailyOpenSync);
    }

    function activateTab(tab) {
      all(".view").forEach((view) => view.classList.toggle("active", view.id === tab));
      all(".tab").forEach((button) => button.setAttribute("aria-selected", button.dataset.tab === tab ? "true" : "false"));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function readPhotoFile(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve("");
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || "");
        reader.onerror = () => resolve("");
        reader.readAsDataURL(file);
      });
    }

    function bindDynamic() {
      all("[data-water-fly]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          activeWaterFlyByWater[button.dataset.waterId] = button.dataset.waterFly;
          renderWaters();
          bindDynamic();
        });
      });
      all("[data-water]").forEach((button) => {
        button.addEventListener("click", (event) => {
          if (event.target.closest("button, a, input, select, textarea, [data-library-fly]")) return;
          saveActiveWater(button.dataset.water);
          renderAll();
          if (!liveReports.byWater[activeWater] && navigator.onLine !== false) refreshLiveReport(activeWater, { mode: "manual" });
          if (button.dataset.go) activateTab(button.dataset.go);
        });
      });
      const homeWaterSelect = $("[data-home-water]");
      if (homeWaterSelect) {
        homeWaterSelect.addEventListener("change", () => {
          saveHomeWater(homeWaterSelect.value);
          saveActiveWater(homeWaterSelect.value);
          renderAll();
          if (!liveReports.byWater[homeWaterId] && navigator.onLine !== false) refreshLiveReport(homeWaterId, { mode: "manual" });
        });
      }
      all("[data-refresh-live]").forEach((button) => {
        button.addEventListener("click", () => refreshLiveReport(button.dataset.refreshLive, { mode: "manual" }));
      });
      all("[data-refresh-all]").forEach((button) => {
        button.addEventListener("click", () => refreshAllWaterReports("manual"));
      });
      all("[data-use-location]").forEach((button) => {
        button.addEventListener("click", () => requestUserLocation());
      });
      all("[data-water-sort]").forEach((button) => {
        button.addEventListener("click", () => {
          waterSortMode = button.dataset.waterSort;
          if (waterSortMode === "Near" && !userLocation) {
            requestUserLocation();
            return;
          }
          renderWaters();
          bindDynamic();
        });
      });
      all("[data-water-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          waterFilter = button.dataset.waterFilter;
          renderWaters();
          bindDynamic();
        });
      });
      const waterSearch = $("[data-water-search]");
      if (waterSearch) {
        waterSearch.addEventListener("input", () => {
          waterQuery = waterSearch.value;
          renderWaters();
          bindDynamic();
          const nextSearch = $("[data-water-search]");
          if (nextSearch) {
            nextSearch.focus();
            nextSearch.setSelectionRange(nextSearch.value.length, nextSearch.value.length);
          }
        });
      }
      all("[data-bug]").forEach((button) => {
        const openBug = (event) => {
          if (event.target.closest("button, a, input, select, textarea, [data-library-fly], [data-bug-stage], [data-clear-bug-stage]")) return;
          activeBug = button.dataset.bug;
          activeBugStage = null;
          activeFlyName = null;
          renderBugs();
          bindDynamic();
        };
        button.addEventListener("click", openBug);
        button.addEventListener("keydown", (event) => {
          if (event.target !== button) return;
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openBug(event);
          }
        });
      });
      all("[data-bug-stage]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          activeBugStage = button.dataset.bugStage;
          activeFlyName = null;
          renderBugs();
          bindDynamic();
        });
      });
      all("[data-clear-bug-stage]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          activeBugStage = null;
          activeFlyName = null;
          renderBugs();
          bindDynamic();
        });
      });
      all("[data-library-fly]").forEach((button) => {
        const openLibraryFly = (event) => {
          event.stopPropagation();
          const libraryFly = findLibraryFlyByName(button.dataset.libraryFly);
          if (libraryFly) {
            activeBug = libraryFly.bugId;
            activeBugStage = libraryFly.stage;
            activeFlyName = libraryFly.name;
          } else {
            activeFlyName = button.dataset.libraryFly;
          }
          renderBugs();
          bindDynamic();
        };
        button.addEventListener("click", openLibraryFly);
        button.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openLibraryFly(event);
          }
        });
      });
      all("[data-tab-jump]").forEach((button) => {
        button.addEventListener("click", () => activateTab(button.dataset.tabJump));
      });
      all("[data-new-log]").forEach((button) => {
        button.addEventListener("click", () => {
          logFormOpen = !logFormOpen;
          editingLogIndex = null;
          renderLog();
          bindDynamic();
          if (logFormOpen) {
            $("#logForm")?.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });
      all("[data-edit-log]").forEach((button) => {
        button.addEventListener("click", () => {
          editingLogIndex = Number(button.dataset.editLog);
          logFormOpen = true;
          renderLog();
          bindDynamic();
          $("#logForm")?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
      all("[data-delete-log]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.deleteLog);
          const nextLogs = getLogs().filter((_, itemIndex) => itemIndex !== index);
          setLogs(nextLogs);
          if (editingLogIndex === index) {
            editingLogIndex = null;
            logFormOpen = false;
          }
          renderLog();
          bindDynamic();
        });
      });
      const logForm = $("#logForm");
      if (logForm) {
        logForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(logForm);
          const water = waters.find((item) => item.id === form.get("water")) || getWater();
          const photo = await readPhotoFile(form.get("photo")) || form.get("existingPhoto") || "";
          const entry = {
            date: new Date().toLocaleDateString([], { month: "short", day: "numeric" }),
            time: form.get("time"),
            waterName: water.name,
            waterId: water.id,
            fly: form.get("fly"),
            fish: form.get("fish"),
            length: form.get("length"),
            count: form.get("count"),
            notes: form.get("notes"),
            flow: water.flow,
            temp: liveDisplayValue(water, "temp"),
            photo
          };
          const logs = getLogs();
          if (editingLogIndex !== null) {
            logs[editingLogIndex] = { ...logs[editingLogIndex], ...entry, date: logs[editingLogIndex].date || entry.date };
            setLogs(logs.slice(0, 8));
          } else {
            setLogs([entry, ...logs].slice(0, 8));
          }
          logFormOpen = false;
          editingLogIndex = null;
          renderLog();
          bindDynamic();
        });
      }
      const billingButton = $("[data-billing]");
      if (billingButton) {
        billingButton.addEventListener("click", () => {
          billing = billing === "annual" ? "monthly" : "annual";
          renderPro();
          bindDynamic();
        });
      }
    }

    all(".tab").forEach((button) => {
      button.addEventListener("click", () => activateTab(button.dataset.tab));
    });

    userLocation = readUserLocation();
    hydrateWaterCache();
    renderAll();
    runInitialDataSync();
    startDailyOpenSyncWatcher();
  </script>
</body>
</html>
